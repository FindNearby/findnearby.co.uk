<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby - Discover Local Amenities</title>
    <script type="text/javascript">
        // Get the current hash (e.g., #privacy)
        var hash = window.location.hash;
        var baseUrl = "https://findnearby.carrd.co";
        var redirectUrl = hash ? baseUrl + hash : baseUrl;
        
        // Redirect preserving the hash
        window.location.replace(redirectUrl);
    </script>
</head>
<body>
    <p>If you are not redirected automatically, <a href="https://findnearby.carrd.co">click here</a>.</p>
</body>
</html>
